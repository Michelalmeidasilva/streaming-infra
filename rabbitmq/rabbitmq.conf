# RabbitMQ 3.13 ships a 30-minute default consumer_timeout. The transcode worker
# holds a delivery unacked for the whole (potentially multi-hour) ffmpeg job, so
# the broker would force-close the channel ("delivery channel closed") and requeue
# the message mid-transcode. Raise it to 3h to match TRANSCODE_JOB_TIMEOUT_SECONDS.
consumer_timeout = 10800000
