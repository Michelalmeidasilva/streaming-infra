services:
  # MongoDB - Primary database for streaming events, metadata, and distribution
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: >
        mongosh --username admin --password password
        --authenticationDatabase admin
        --eval 'db.runCommand({ ping: 1 })' --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ - Message broker for video processing pipeline
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    # Pin the hostname so the Erlang node is always rabbit@rabbitmq. Without it the
    # node name follows the random container id, so every recreate starts a fresh
    # node and orphans the durable queues/messages in the data volume.
    hostname: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI port (http://localhost:15672 - guest/guest)
      - "15692:15692"    # Prometheus metrics
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/10-consumer-timeout.conf:ro
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache layer for streaming distribution and real-time data
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # MinIO - S3-compatible object storage for video files and assets
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"      # MinIO S3 API port
      - "9001:9001"      # MinIO Console port (http://localhost:9001 - admin/password123)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 5
    command: server /data --console-address ":9001"

  # MinIO Setup - Creates initial buckets and configures webhooks
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Setting up MinIO client...';
      /usr/bin/mc alias set local http://minio:9000 admin password123;
      echo 'Creating videos bucket...';
      /usr/bin/mc mb local/videos || true;
      echo 'Applying MinIO CORS policy...';
      printf '%s' '<CORSConfiguration><CORSRule><AllowedOrigin>*</AllowedOrigin><AllowedMethod>GET</AllowedMethod><AllowedMethod>PUT</AllowedMethod><AllowedMethod>POST</AllowedMethod><AllowedMethod>DELETE</AllowedMethod><AllowedMethod>HEAD</AllowedMethod><AllowedHeader>*</AllowedHeader><ExposeHeader>ETag</ExposeHeader><ExposeHeader>x-amz-request-id</ExposeHeader><MaxAgeSeconds>3600</MaxAgeSeconds></CORSRule></CORSConfiguration>' >/tmp/videos-cors.xml;
      /usr/bin/mc cors set local/videos /tmp/videos-cors.xml;
      echo 'Making videos bucket public for download (playback of relative HLS/DASH children)...';
      /usr/bin/mc anonymous set download local/videos;
      echo 'MinIO setup completed!';
      "

  # Event Gateway - Ingests upload events and publishes to RabbitMQ
  streaming-ingest:
    build:
      context: ../streaming-ingest
      dockerfile: Dockerfile
    container_name: streaming-ingest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ../streaming-ingest/.env
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/streaming?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SERVER_PORT: 8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default

  # Upload Platform - Admin UI for video uploads
  streaming-platform-upload:
    build:
      context: ../streaming-platform-upload
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_E2E_AUTH_ENABLED: "1"
        NEXT_PUBLIC_E2E_ADMIN_EMAIL: admin@local.dev
        NEXT_PUBLIC_STORAGE_DIRECT_UPLOAD_ENABLED: "false"
        # Must match UPLOAD_MAX_FILE_SIZE_GB in .env — NEXT_PUBLIC_* is inlined
        # into the client bundle at build time, so env_file alone won't raise it.
        NEXT_PUBLIC_UPLOAD_MAX_FILE_SIZE_GB: "10"
    container_name: streaming-platform-upload
    restart: unless-stopped
    ports:
      # Host 3000 -> container 3000 (Grafana moved to host :3009 to free this up).
      - "3000:3000"
    env_file:
      - ../streaming-platform-upload/.env
    environment:
      EVENT_GATEWAY_URL: http://streaming-ingest:8080/api/v1
      INGEST_PERSISTENCE_BASE_URL: http://streaming-ingest:8080/api/v1
      INGEST_STORAGE_WEBHOOK_BASE_URL: http://streaming-ingest:8080/api/v1
      # Use local MinIO (override the s3 defaults from .env.example). Credentials
      # must match the minio service (admin/password123), not the example values.
      # Inside the container `localhost` is the container itself, so MINIO_ENDPOINT
      # must use the `minio` service DNS name, not the host-oriented value in .env.
      MINIO_ENDPOINT: http://minio:9000
      # Browser-facing base for object URLs (e.g. thumbnails). Must be the
      # host-published URL, since the browser cannot resolve the `minio` DNS name.
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # STORAGE_PROVIDER: minio
      # STORAGE_BUCKET: videos
      # MINIO_ACCESS_KEY: admin
      # MINIO_SECRET_KEY: password123
      # E2E_AUTH_ENABLED: "1"
      # NEXT_PUBLIC_E2E_AUTH_ENABLED: "1"
      # E2E_ADMIN_EMAIL: admin@local.dev
      # NEXT_PUBLIC_E2E_ADMIN_EMAIL: admin@local.dev
      # ADMIN_EMAILS: admin@local.dev
    depends_on:
      - streaming-ingest
      - minio
    networks:
      - default

  # Streaming Transcode - Consumes upload completion events and creates HLS/DASH outputs
  streaming-transcode:
    build:
      context: ../streaming-transcode
      dockerfile: Dockerfile
    container_name: streaming-transcode
    restart: unless-stopped
    env_file:
      - ../streaming-transcode/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      streaming-ingest:
        condition: service_started
    networks:
      - default

  # Streaming Distribution - Serves manifest URLs to consumer clients
  streaming-distribution:
    build:
      context: ../streaming-distribution
      dockerfile: Dockerfile
    container_name: streaming-distribution
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - ../streaming-distribution/.env
    environment:
      SERVER_PORT: 8082
      MONGODB_URI: mongodb://admin:password@mongodb:27017/streaming?authSource=admin
      REDIS_URL: redis://redis:6379
      STORAGE_PROVIDER: minio
      STORAGE_BUCKET: videos
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      # Public URL mode: browser plays manifests directly from MinIO; relative
      # child playlists/segments resolve because the bucket is public-read.
      CDN_BASE: http://localhost:9000/videos
      TRANSCODED_PREFIX: transcoded
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default

  # Web Client - Consumer-facing PWA (SvelteKit + Shaka Player)
  streaming-web-client:
    build:
      context: ../streaming-web-client
      dockerfile: Dockerfile
      args:
        # PUBLIC_ vars são embutidos no build estático pelo SvelteKit
        PUBLIC_DISTRIBUTION_URL: http://localhost:8082
        PUBLIC_API_KEY: pk_dev
    container_name: streaming-web-client
    restart: unless-stopped
    env_file:
      - ../streaming-web-client/.env
    ports:
      - "5173:80"    # http://localhost:5173
    networks:
      - default

  # Mongo Express - Web-based MongoDB management UI
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/?authSource=admin
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      mongodb:
        condition: service_healthy

  # Grafana - Unified dashboards over CloudWatch/moto (host :3009)
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3009:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana-datasources.cloudwatch.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./observability/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - moto
    networks:
      - default

  # Dev-only CloudWatch + Logs emulator (OSS). Host 5001 (5000 is AirPlay on macOS).
  moto:
    image: motoserver/moto:latest
    container_name: moto
    restart: unless-stopped
    ports:
      - "5001:5000"
    networks:
      - default

  # Dev-only: parse service EMF stdout -> PutMetricData to moto.
  emf-forwarder:
    build: ./observability/emf-forwarder
    container_name: emf-forwarder
    restart: unless-stopped
    environment:
      - AWS_ENDPOINT_URL=http://moto:5000
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - moto
    networks:
      - default

volumes:
  mongodb_data:
  rabbitmq_data:
  redis_data:
  minio_data:
  grafana-data:

networks:
  default:
    name: vod-network
