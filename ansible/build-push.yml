---
- name: Build and push service images to ECR
  hosts: local
  gather_facts: false
  vars:
    services:
      - { name: ingest, dir: streaming-ingest, repo: "{{ ecr_repos.ingest }}" }
      - { name: distribution, dir: streaming-distribution, repo: "{{ ecr_repos.distribution }}" }
      - { name: transcode, dir: streaming-transcode, repo: "{{ ecr_repos.transcode }}" }
  tasks:
    - name: Get AWS account id
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: aws_account
      changed_when: false

    - name: Set registry fact
      ansible.builtin.set_fact:
        registry: "{{ aws_account.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com"

    - name: ECR login
      ansible.builtin.shell: >
        aws ecr get-login-password --region {{ aws_region }}
        | docker login --username AWS --password-stdin {{ registry }}
      changed_when: false

    - name: Build images (linux/amd64)
      ansible.builtin.command: >
        docker build --platform linux/amd64
        -t {{ registry }}/{{ item.repo }}:latest
        {{ services_root }}/{{ item.dir }}
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Push images
      ansible.builtin.command: docker push {{ registry }}/{{ item.repo }}:latest
      loop: "{{ services }}"
      loop_control:
        label: "{{ item.name }}"

    # -----------------------------------------------------------------------
    # Benchmark orchestrator — cross-repo build (streaming-benchmark-orchestrator)
    # PRE-REQUISITO DE DEPLOY: a imagem vod-benchmark-orchestrator deve existir no ECR
    # antes de `terraform apply` do módulo benchmark-trigger.
    #
    # Nuance de build-context: o Dockerfile do orquestrador fica em
    #   ../streaming-benchmark-orchestrator/
    # e requer uma cópia do diretório aws/ deste repo dentro do contexto de build
    # (para que o Lambda leia as definições Terraform). A sequência é:
    #   1. cp -r <streaming-infra>/aws <orchestrator>/aws
    #   2. docker build -f <orchestrator>/Dockerfile <orchestrator>/
    #   3. rm -rf <orchestrator>/aws
    # -----------------------------------------------------------------------
    - name: Copy aws/ into orchestrator build context
      ansible.builtin.command: >
        cp -r {{ services_root }}/streaming-infra/aws
        {{ services_root }}/streaming-benchmark-orchestrator/aws
      args:
        creates: "{{ services_root }}/streaming-benchmark-orchestrator/aws"

    - name: Build benchmark-orchestrator image (linux/amd64)
      ansible.builtin.command: >
        docker build --platform linux/amd64
        -t {{ registry }}/{{ ecr_repos.benchmark_orchestrator }}:latest
        {{ services_root }}/streaming-benchmark-orchestrator
      register: _orchestrator_build

    - name: Remove aws/ copy from orchestrator build context
      ansible.builtin.file:
        path: "{{ services_root }}/streaming-benchmark-orchestrator/aws"
        state: absent
      when: _orchestrator_build is defined

    - name: Push benchmark-orchestrator image
      ansible.builtin.command: >
        docker push {{ registry }}/{{ ecr_repos.benchmark_orchestrator }}:latest
